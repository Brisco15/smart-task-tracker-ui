<div class="create-button">
  <button mat-raised-button color="primary" (click)="createProject()">
    New Project
  </button>
  <button mat-button (click)="showDebugPanel = !showDebugPanel" style="margin-left: 10px;">
    {{ showDebugPanel ? 'Hide' : 'Show' }} Debug Info
  </button>
  <button mat-button color="accent" (click)="forceRefresh()" style="margin-left: 10px;">
    Force Refresh
  </button>
</div>

<!-- Debug Panel -->
<div *ngIf="showDebugPanel" style="padding: 10px; background: #f5f5f5; border-radius: 4px; margin-bottom: 10px; font-family: monospace; font-size: 12px;">
  <strong>Debug Info:</strong><br>
  <pre>{{ getDebugInfo() | json }}</pre>
</div>

<!-- Loading State -->
<div *ngIf="isLoadingProjects" style="padding: 20px; text-align: center; background: #e3f2fd; border-radius: 4px;">
    Loading projects...
</div>

<!-- Error State with Retry -->
<div *ngIf="error" style="padding: 15px; background-color:#ffebee ; border-radius: 4px; color: red; margin-bottom: 10px;">
    <p>{{error}}</p>
    <button mat-button color="primary" (click)="loadProjects()">Retry</button>
</div>

<!-- Projects Table -->
<div class="table-container" *ngIf="!isLoadingProjects && dataSource.data.length > 0">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      
        <!-- projectID Column -->
        <ng-container matColumnDef="projectID">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let project">{{project.projectID}}</td>
        </ng-container>

        <!-- projectName Column -->
        <ng-container matColumnDef="projectName">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let project">{{project.projectName}}</td>
        </ng-container>

         <!-- description Column -->
        <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let project" 
                class="description-cell" 
                [title]="project.description">
                {{project.description}}
            </td>
        </ng-container>

         <!-- startDate Column -->
        <ng-container matColumnDef="startDate">
            <th mat-header-cell *matHeaderCellDef>Start</th>
            <td mat-cell *matCellDef="let project">{{project.startDate}}</td>
        </ng-container>

         <!-- endDate Column -->
        <ng-container matColumnDef="endDate">
            <th mat-header-cell *matHeaderCellDef>End</th>
            <td mat-cell *matCellDef="let project">{{project.endDate}}</td>
        </ng-container>

        <!-- createdBy Column -->
        <ng-container matColumnDef="createdBy">
            <th mat-header-cell *matHeaderCellDef>Created By</th>
            <td mat-cell *matCellDef="let project">{{project.createdBy?.userName}}</td>
        </ng-container>

        <!-- actions Column -->
        <ng-container matColumnDef="actions">
         <th mat-header-cell *matHeaderCellDef>Actions</th>
         <td mat-cell *matCellDef="let project">
           <div class="action-buttons">
              <button mat-raised-button color="primary" (click)="editProject(project.projectID)">
               Edit
              </button>
              <button mat-raised-button color="warn" (click)="deleteProject(project.projectID)" style="margin-left: 8px;">
               Delete
              </button>
              <mat-checkbox (change)="archiveProject(project.projectID)" style="margin-left: 8px;">
               Archive
              </mat-checkbox>
              <button mat-raised-button color="primary" (click)="goToTasks(project.projectID)" style="background-color: aquamarine;">
               View Tasks
              </button>
           </div>
         </td>
        </ng-container>

       <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
       <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>

<!-- ✅ Paginator OHNE *ngIf - immer gerendert, nur visuell versteckt -->
<mat-paginator [hidden]="isLoadingProjects || error || dataSource.data.length === 0"
               [pageSizeOptions]="[5, 10, 20]"
               showFirstLastButtons
               aria-label="Select page of projects">
</mat-paginator>

<div *ngIf="!isLoadingProjects && !error && dataSource.data.length === 0" 
     style="padding: 20px; text-align: center; background: #fff3cd; border-radius: 4px;">
  <p>No projects found. <button mat-button color="primary" (click)="loadProjects()">Retry</button></p>
</div>
